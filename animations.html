<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Demo Animations</title>
<style>
body { margin: 0; background: #060810; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; font-family: sans-serif; color: #cbd5e1; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 2rem; max-width: 56rem; }
.card { background: #101620; border: 1px solid #182030; border-radius: 8px; padding: 1.5rem; text-align: center; }
.card h3 { color: #c9a84c; margin: 0.5rem 0; }
.demo { height: 120px; display: flex; align-items: center; justify-content: center; }

/* Pulse */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.3); }
}
.pulse-rune { font-size: 4rem; color: #c9a84c; animation: pulse 2s ease-in-out infinite; }

/* Spin + glow */
@keyframes spinGlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.spin-rune { font-size: 4rem; color: #c9a84c; animation: spinGlow 6s linear infinite; text-shadow: 0 0 20px #c9a84c; }

/* Orbit */
.orbit { position: relative; width: 100px; height: 100px; }
.orbit-rune { position: absolute; font-size: 1.5rem; color: #c9a84c; top: 50%; left: 50%; transform-origin: 0 0; animation: spinGlow 4s linear infinite; }
.orbit-rune:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateX(40px); }
.orbit-rune:nth-child(2) { transform: translate(-50%, -50%) rotate(72deg) translateX(40px); }
.orbit-rune:nth-child(3) { transform: translate(-50%, -50%) rotate(144deg) translateX(40px); }
.orbit-rune:nth-child(4) { transform: translate(-50%, -50%) rotate(216deg) translateX(40px); }
.orbit-rune:nth-child(5) { transform: translate(-50%, -50%) rotate(288deg) translateX(40px); }

/* Wave */
@keyframes wave {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-12px); }
  75% { transform: translateY(12px); }
}
.wave-runes { font-size: 2rem; color: #c9a84c; display: flex; gap: 0.5rem; }
.wave-runes span { animation: wave 1.5s ease-in-out infinite; }
.wave-runes span:nth-child(2) { animation-delay: 0.1s; }
.wave-runes span:nth-child(3) { animation-delay: 0.2s; }
.wave-runes span:nth-child(4) { animation-delay: 0.3s; }
.wave-runes span:nth-child(5) { animation-delay: 0.4s; }
.wave-runes span:nth-child(6) { animation-delay: 0.5s; }
.wave-runes span:nth-child(7) { animation-delay: 0.6s; }

/* Draw circle */
@keyframes drawCircle {
  from { stroke-dashoffset: 360; }
  to { stroke-dashoffset: 0; }
}
.draw-circle { stroke-dasharray: 360; stroke-dashoffset: 360; animation: drawCircle 3s linear infinite; }

/* Draw path */
@keyframes drawPath {
  from { stroke-dashoffset: 600; }
  to { stroke-dashoffset: 0; }
}
.draw-path { stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawPath 4s linear infinite; }
</style>
</head>
<body>
<div class="grid">
<div class="card">
<div class="demo"><div class="pulse-rune">ᛏ</div></div>
<h3>Pulse</h3>
<p style="color:#64748b;font-size:.875rem;">Heartbeat rune — load indicators, attention</p>
</div>

<div class="card">
<div class="demo"><div class="spin-rune">ᛟ</div></div>
<h3>Spin + Glow</h3>
<p style="color:#64748b;font-size:.875rem;">Loading spinner, eternal rune</p>
</div>

<div class="card">
<div class="demo">
<div class="orbit">
<div class="orbit-rune">ᚠ</div>
<div class="orbit-rune">ᚢ</div>
<div class="orbit-rune">ᚦ</div>
<div class="orbit-rune">ᚨ</div>
<div class="orbit-rune">ᚱ</div>
</div>
</div>
<h3>Orbit</h3>
<p style="color:#64748b;font-size:.875rem;">Five runes orbiting — hero decoration</p>
</div>

<div class="card">
<div class="demo">
<div class="wave-runes">
<span>ᚠ</span><span>ᚢ</span><span>ᚦ</span><span>ᚨ</span><span>ᚱ</span><span>ᚲ</span><span>ᚷ</span>
</div>
</div>
<h3>Wave</h3>
<p style="color:#64748b;font-size:.875rem;">Staggered wave — text reveal</p>
</div>

<div class="card">
<div class="demo">
<svg width="100" height="100" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="40" stroke="#c9a84c" stroke-width="2" fill="none" class="draw-circle" />
<text x="50" y="58" text-anchor="middle" fill="#c9a84c" font-size="20">ᛁ</text>
</svg>
</div>
<h3>Draw Circle</h3>
<p style="color:#64748b;font-size:.875rem;">SVG path animation</p>
</div>

<div class="card">
<div class="demo">
<svg width="100" height="100" viewBox="0 0 100 100">
<path d="M10,50 Q30,10 50,50 T90,50" stroke="#c9a84c" stroke-width="2" fill="none" class="draw-path" />
<circle cx="10" cy="50" r="3" fill="#c9a84c" />
<circle cx="90" cy="50" r="3" fill="#c9a84c" />
</svg>
</div>
<h3>Draw Path</h3>
<p style="color:#64748b;font-size:.875rem;">Wave path — hero divider</p>
</div>
</div>
</body>
</html>
