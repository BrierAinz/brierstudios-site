name: Lighthouse Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Lighthouse via API
        env:
          LH_GA_API: ${{ secrets.LH_GA_API }}
        run: |
          # Try Lighthouse CI
          npm install --no-save @lhci/cli 2>&1 | tail -3
          lhci collect --url=https://brierstudios.com/ --numberOfRuns=1 || true

      - name: Lighthouse via Google API (fallback)
        run: |
          mkdir -p .lighthouse
          curl -sS "https://pagespeedonline.googleapis.com/pagespeedonline/v5/runPagespeed?url=https://brierstudios.com/&strategy=mobile&category=performance&category=accessibility&category=seo&category=best-practices" -o .lighthouse/mobile.json || echo "rate-limited, skipping"
          ls -la .lighthouse/

      - name: Parse and report
        if: always()
        run: |
          if [ -f .lighthouse/mobile.json ]; then
            node -e "
              const fs = require('fs');
              const d = JSON.parse(fs.readFileSync('.lighthouse/mobile.json', 'utf-8'));
              const cats = d.lighthouseResult.categories;
              const scores = Object.entries(cats).map(([k, v]) => k + ': ' + Math.round(v.score * 100)).join(', ');
              console.log('## Lighthouse Scores (mobile)');
              console.log(scores);
              fs.writeFileSync('LIGHTHOUSE.md', '# Lighthouse\n\n**Scores (0-100):** ' + scores + '\n\nGenerated: ' + new Date().toISOString() + '\n');
            "
            cat LIGHTHOUSE.md
          else
            echo "No Lighthouse data (rate-limited or API error)"
          fi