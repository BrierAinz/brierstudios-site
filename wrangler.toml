name = "brierstudios-contact"
main = "worker-contact.js"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"
# TURNSTILE_SECRET must be set via `wrangler secret put TURNSTILE_SECRET` (not committed)

[[kv_namespaces]]
binding = "CONTACTS"
id = "3fb19e866d3042efaf521d27c3a7efa8"

routes = [
  { pattern = "contact.brierstudios.com/*", zone_name = "brierstudios.com" }
]

