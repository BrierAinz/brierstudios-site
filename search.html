<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<title>Search — BrierStudios</title>
<link rel="canonical" href="https://brierstudios.com/search">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/styles.css?v=4.1">
<meta name="description" content="Search BrierStudios: pages, projects, releases, documentation links.">
</head>
<body>
<main style="max-width:48rem;margin:0 auto;padding:8rem 1.5rem 4rem;">
<h1 style="font-family:var(--font-display);color:var(--gold);font-size:2.5rem;margin-bottom:.5rem;">Search</h1>
<p style="color:var(--text-dim);margin-bottom:2rem;">Find pages, projects, releases, and links across BrierStudios.</p>

<div class="site-search" style="max-width:48rem;">
<input type="search" id="search-input" placeholder="Type to search..." autofocus autocomplete="off">
<div class="site-search-results" id="search-results"></div>
</div>

<div id="empty" style="color:var(--text-dim);margin-top:2rem;">
<p>Type at least 2 characters. Try: <a href="#" class="suggest" style="color:var(--gold);">lilith</a>, <a href="#" class="suggest" style="color:var(--gold);">cli</a>, <a href="#" class="suggest" style="color:var(--gold);">yggdrasil</a>, <a href="#" class="suggest" style="color:var(--gold);">docs</a>, <a href="#" class="suggest" style="color:var(--gold);">newsletter</a></p>
</div>

<div id="no-results" style="display:none;color:var(--text-dim);margin-top:2rem;">No results. Try different keywords.</div>
</main>

<script src="search.js"></script>
<script>
const input = document.getElementById('search-input');
const results = document.getElementById('search-results');
const empty = document.getElementById('empty');
const noResults = document.getElementById('no-results');

input.addEventListener('input', () => {
  const q = input.value.trim();
  if (q.length < 2) {
    results.classList.remove('active');
    empty.style.display = 'block';
    noResults.style.display = 'none';
    return;
  }
  const hits = window.SiteSearch.search(q, 10);
  if (hits.length === 0) {
    results.classList.remove('active');
    empty.style.display = 'none';
    noResults.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  noResults.style.display = 'none';
  results.innerHTML = hits.map(h =>
    '<a class="site-search-result" href="' + h.href + '"' + (h.href.startsWith('http') ? ' target="_blank" rel="noopener"' : '') + '>' +
    '<div class="site-search-result-title">' + escapeHtml(h.title) + '</div>' +
    '<div class="site-search-result-section">' + h.section + ' · ' + escapeHtml(h.text.slice(0, 80)) + (h.text.length > 80 ? '…' : '') + '</div>' +
    '</a>'
  ).join('');
  results.classList.add('active');
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { input.value = ''; input.dispatchEvent(new Event('input')); }
});

document.querySelectorAll('.suggest').forEach(a => {
  a.addEventListener('click', (e) => {
    e.preventDefault();
    input.value = a.textContent;
    input.dispatchEvent(new Event('input'));
    input.focus();
  });
});

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// Check URL for ?q=
const params = new URLSearchParams(location.search);
if (params.get('q')) {
  input.value = params.get('q');
  input.dispatchEvent(new Event('input'));
}
</script>
</body>
</html>
