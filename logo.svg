<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="frostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a12"/>

  <!-- Outer hexagonal frame -->
  <polygon points="256,40 432,136 432,376 256,472 80,376 80,136" 
           fill="none" stroke="url(#frostGrad)" stroke-width="2" opacity="0.6"/>
  <polygon points="256,60 416,146 416,366 256,452 96,366 96,146" 
           fill="none" stroke="url(#iceGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Circuit lines from corners -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.3">
    <!-- Top -->
    <line x1="256" y1="40" x2="256" y2="100"/>
    <circle cx="256" cy="100" r="2" fill="#38bdf8"/>
    <!-- Top-right -->
    <line x1="432" y1="136" x2="380" y2="166"/>
    <circle cx="380" cy="166" r="2" fill="#38bdf8"/>
    <!-- Bottom-right -->
    <line x1="432" y1="376" x2="380" y2="346"/>
    <circle cx="380" cy="346" r="2" fill="#38bdf8"/>
    <!-- Bottom -->
    <line x1="256" y1="472" x2="256" y2="412"/>
    <circle cx="256" cy="412" r="2" fill="#38bdf8"/>
    <!-- Bottom-left -->
    <line x1="80" y1="376" x2="132" y2="346"/>
    <circle cx="132" cy="346" r="2" fill="#38bdf8"/>
    <!-- Top-left -->
    <line x1="80" y1="136" x2="132" y2="166"/>
    <circle cx="132" cy="166" r="2" fill="#38bdf8"/>
  </g>

  <!-- Central rune ᛒ (Berkano) - Stylized -->
  <g filter="url(#glow)">
    <!-- Main vertical stroke -->
    <line x1="200" y1="140" x2="200" y2="380" stroke="url(#iceGrad)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Upper triangle pointing right -->
    <polyline points="200,170 310,220 200,270" fill="none" stroke="url(#iceGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Lower triangle pointing right (larger) -->
    <polyline points="200,260 330,320 200,380" fill="none" stroke="url(#iceGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Inner circuit detail on rune -->
  <g stroke="#7dd3fc" stroke-width="1.5" opacity="0.5">
    <!-- Dot at upper triangle tip -->
    <circle cx="310" cy="220" r="4" fill="#7dd3fc" opacity="0.8"/>
    <!-- Dot at lower triangle tip -->
    <circle cx="330" cy="320" r="4" fill="#7dd3fc" opacity="0.8"/>
    <!-- Connection line between triangles -->
    <line x1="310" y1="220" x2="330" y2="320" stroke-dasharray="4,4"/>
  </g>

  <!-- Subtle frost particles -->
  <g fill="#bae6fd" opacity="0.15">
    <circle cx="150" cy="200" r="1.5"/>
    <circle cx="350" cy="180" r="1"/>
    <circle cx="180" cy="350" r="1"/>
    <circle cx="370" cy="280" r="1.5"/>
    <circle cx="280" cy="140" r="1"/>
    <circle cx="160" cy="300" r="1.5"/>
    <circle cx="340" cy="400" r="1"/>
    <circle cx="140" cy="250" r="1"/>
    <circle cx="360" cy="360" r="1.5"/>
  </g>

  <!-- Scanning lines -->
  <line x1="96" y1="256" x2="416" y2="256" stroke="#38bdf8" stroke-width="0.5" opacity="0.15"/>
  <line x1="256" y1="60" x2="256" y2="452" stroke="#38bdf8" stroke-width="0.5" opacity="0.1"/>
</svg>